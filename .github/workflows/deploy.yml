# Deploy to Cloudflare Pages
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — API token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — account ID from the Cloudflare dashboard
#
# First deploy creates the Pages project "website-portfolio" automatically.
# Custom domain (jkvapil.cz) is attached in the Cloudflare dashboard:
#   Pages → website-portfolio → Custom domains → add jkvapil.cz
# Redirect domains (jkvapil.info, jkvapil.online) are NOT part of this repo:
#   add both zones to Cloudflare → Rules → Redirect Rules →
#   dynamic redirect to concat("https://jkvapil.cz", http.request.uri.path), 301

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm astro build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=website-portfolio --branch=main
