# Deploy to Cloudflare Pages
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — API token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — account ID from the Cloudflare dashboard
#
# First deploy creates the Pages project "website-portfolio" automatically.
# Custom domain (jkvapil.cz) is attached in the Cloudflare dashboard:
#   Pages → website-portfolio → Custom domains → add jkvapil.cz
# Redirect domains (jkvapil.info, jkvapil.online) are configured as
# Redirect Rules on their zones, not in this repo.

name: Deploy

# push to main → production (jkvapil.cz); push to any other branch → a
# Cloudflare Pages preview URL (safe on-device AR testing, no prod impact).
on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v7

      # reads the pinned version from package.json "packageManager"
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm astro build

      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@v4
        continue-on-error: true # fails harmlessly when the project already exists
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: pages project create website-portfolio --production-branch=main

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler is a devDependency — the action reuses the pnpm install
          packageManager: pnpm
          # branch = current branch: "main" deploys to production, anything else
          # becomes a preview deployment with its own URL
          command: pages deploy dist --project-name=website-portfolio --branch=${{ github.ref_name }}

      - name: Report deployment URL
        run: echo "### Deployed → ${{ steps.deploy.outputs.deployment-url }}" >> "$GITHUB_STEP_SUMMARY"
